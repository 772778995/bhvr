# bhvr — NotebookLM 自动化研究引擎
# 单服务部署，前后端同镜像，SQLite 数据库持久化到 ./data

services:
  app:
    image: hocho5i996/rj-readbook:latest
    container_name: bhvr
    ports:
      - "3450:3450"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      # ── OpenAI 兼容 API（可选，用于书籍查找功能）──────────────────────
      OPENAI_BASE_URL: "https://uniapi.ruijie.com.cn/v1"
      OPENAI_TOKEN: "52TvGRm6xZSod3tMkNt82QLTmw2BFZX5sRsUyiN8cXxoWOxr"
      OPENAI_MODEL: "DeepSeek-V3.1"

      # ── 书籍元数据桥接（可选）────────────────────────────────────────
      BOOK_METADATA_BASE_URL: ""
      BOOK_METADATA_API_KEY: ""
      BOOK_METADATA_TIMEOUT_MS: "3000"

      # ── NotebookLM 认证（二选一）─────────────────────────────────────
      # 方式 A：挂载文件（推荐）
      #   将 storage-state.json 放到宿主机 ./data/ 目录后自动生效
      NOTEBOOKLM_STORAGE_STATE_PATH: "/app/data/storage-state.json"
      # 方式 B：base64 注入（方式 A 未设置时使用）
      NOTEBOOKLM_STORAGE_STATE_JSON_B64: ""

      # ── 安全 ─────────────────────────────────────────────────────────
      # !! 生产环境必须设置 ADMIN_SECRET，否则再认证接口无保护 !!
      ADMIN_SECRET: ""
      # 认证失效时发送 webhook 通知（可选）
      REAUTH_WEBHOOK_URL: ""

